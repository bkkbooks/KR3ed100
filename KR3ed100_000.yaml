front:
  text: 方極序書曰皇建其有極不建有極民何乎遵守醫亦然漢張仲景著傷寒論於是乎極建然二千載尚矣其書雖存文之闕也簡之錯也非仲景之古於是錯綜諸篇夕考而朝試如有得焉於是友人云門曾先生曰夫醫之掌疾病者治之也方已今諸家之處方也師弟子不必同何故耶曰無定極也夫仲景之為方也有法方證相對也不論因也建而正於毒之中此之謂極也賢愚無違可違非法治乎在茲不乎在茲習乎在茲教乎在茲此法之不可以忽也猶兵之有法如先後之與取捨則存於其人此之謂略也略不可傳也法可傳矣曾先生曰法之可傳也方已何不記以傳焉曰未盡也曰記其所得焉於是使品玄左記方之所之也名曰方極寶曆五年乙亥仲秋日藝陽吉益為則公言甫撰方極後序夫醫之學也方而已其義乃法仲景也推功實也仲景已沒也王叔和之徒出焉乃始拔功之實乃逐理之末歧之又歧以為百端也噫亦已甚矣往者可往其奈毒於千載之下其奈夫後世喜方之徒恢恑譎怪猶以為不足必斷略於憶於是彼醫路之廢也不可再興也雖百世可知也獨豫家翁生於千載之下憂彼醫路之廢也不可再興也以為己任也乃謂豫曰夫醫之學也方而已故功實所處雖則今世之方一是皆取之如其取之臆也其斷去之此之謂法仲景之古既而集其所試之方名之曰方極蓋極也者取洪範皇極之義也建極於醫路家翁又謂豫曰此書行之與不行乃在命而已世醫其罪我乎吾豈畏世醫所不容乎豫終欲贊父之業議之諸友諸友曰子志善矣於是謹作之跋寶曆十二年冬十二月別猷之謹撰
