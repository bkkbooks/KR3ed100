body:
  text: 方極敘醫方之祖仲景也後世莫不述焉其載方之所之於書也多歧易迷故能得仲景之正路者天下鮮矣蓋假途之鹵莽而不知所準據也吉益先生顛沛造次於仲景參伍其方能知所準據故得其正路而不迷多歧不迷多歧故行之於病者不由徑也得其正路故授之門人有準據也余締交先生有年於此乃語之曰先生之業美則美矣而猶未大也教之所及僅入門之士耳安在其能大也古昔聖人之立極也以為民之準據不則聖人之才猶無奈天下後世何假令先生取諸方之所之於仲景建其正路以為準據於天下後世不迷多歧是先生立極此醫也豈不亦大哉先生曰諾余遂從臾其門人品玄左者乃與其事於是先生之授於口也玄左之受於筆也以成其方極友人云門曾原子泉作敘云爾寶曆五年秋七月東洞先生家孰方第一方太簇丸乃人參大黃丸治腹滿心下痞鞕飲食停滯大便難大黃四十錢黃芩人參各二十錢上三味搗篩為末糊丸如梧桐子大每服三十丸白湯下之第二方夾鍾丸乃硝石大丸今去當歸治腹中有結毒或心下痞鞕者大黃二十四錢硝石十八錢人參甘草各六錢上四味各別杵為散以苦酒三合先內大黃煮作二合內諸藥如飴狀下火冷內硝石杵之為膏丸如梧桐子大每服三十丸飲服之杶按今古方家稱用硝石以煙消之硝石者非也此硝者水消之硝石也第三方姑洗圓乃控涎丹治諸痰飲水毒甘遂大戟白芥子各等分上三味杵節為末蜜丸如梧桐子大每五十丸以生薑湯服之第四方仲呂丸乃如神丸治水毒大小便不通者大黃六兩甘遂牽牛子各三兩上三味杵節為末糊丸如緑豆每服二十丸白湯下之第五方蕤賓丸乃平水丸治腳氣腫滿不大便者商陸四兩甘遂二兩芒硝芫花吳茱萸各三兩上五味為末蜜丸如梧桐子大飲服三丸日三第六方林鐘丸乃甘連大黃丸治心煩不大便者大黃六兩甘草黃連各二兩上三味杵篩為末糊丸如梧桐子大每服三十丸白湯送下之第七方夷則丸乃海浮石丸治腹不滿其人言我滿者海浮石大黃桃仁各等分上三味杵篩為末糊丸如梧桐子大每三十丸白湯服之不知稍加之第八方南呂丸乃滾痰丸今以甘遂代沉香治諸痰飲咳嗽大便不利者黃芩四兩甘遂青礞石各二錢大黃八錢上四味杵篩為末糊丸如梧桐子大每服二十丸日三或至三四十丸溫水下之制礞石法青礞石焰硝各等分土器中煅過以金色為度研飛曬乾用第九方無射丸乃牡蠣角石散治諸瘡瘍膿出不止者牡蠣鹿角霜各一錢輕粉五分上三味杵篩二味為末以輕粉合治雞子白煉為膏黏瘡上第十方應鐘散乃芎黃散治諸上衝轉變不治者大黃二兩川芎六兩上二味杵篩為末每服六分酒或湯送下不治稍加一錢以至下為度若有結毒痼疾者每夕臨臥服之第十一方黃鐘丸乃三黃丸治大便難煩悸而心下痞者大黃四十錢黃芩黃連各二十錢上三味杵篩為末糊丸如梧桐子大每服二三十丸白湯送下以下為度若急下之則酒服之第十二方大呂丸乃備急丸今以糊丸大黃乾薑巴豆各等分上三味先杵二味為末別研巴豆合治糊丸如緑豆大每服一二丸以下為度不知稍加以上十二方先師家孰嘗以十二律命方銘皆是孰生憾方名之不著而命之者也恐非先師意雖然海內通稱而以律呼之故今仍舊以為目冒以第一第二分之井杶記紫丸本以蜜煉之今糊丸之或蜜丸用之治胸腹結毒或胸滿大便難有水毒者代赭石赤石脂巴豆各二十錢杏仁四錢上四味先杵二味為末別研巴豆杏仁內中合治糊丸如緑豆大量病證淺深服之一二分至一錢為度若有不差者每日服之或五丸或十丸若無赤石脂則以鹽藏鐵粉代之製鹽藏鐵粉法上鐵屑二錢食鹽二分攪之密器貯之封藏十日置諸床下地上取出研之水飛曬乾以代赤石脂梅肉霜治諸惡瘡結毒及下疳毒梅諸鹽藏者燒為霜梔子霜各七分五釐巴豆輕粉各二分五釐上四味別研巴豆作泥內三味為散每服二分或三分病重者服一錢熱湯送下之伯州散乃大同類聚方伯耆藥治毒腫又有膿者蝮蛇蟹江河中生者鹿角各等分上三味各燒為霜合治酒每服九分七寶丸治梅瘡結毒及痼疾骨節疼痛諸不能治者牛膝輕粉各二錢土茯苓一錢大黃八分丁子五分上五味合杵篩為末糊丸如緑豆大一日八分分為二服每四分朝夕白湯服之凡六日又七日詰朝服後方後七寶丸巴豆丁子各二分五釐大黃四分上三味先丁子大黃為末別巴豆研內中合冶糊丸如緑豆大凡服前方六日乃至七日詰朝服此方一服一錢白湯下之制丁子法丁子一錢內粳米六七粒別研之悉為細末不然黏不能末之杶嘗見今稱古方家者用七寶丸之法凡六日而至七日詰朝不用此方後而唯用紫丸或備急丸以取其瀉下為法是大不然也夫巴豆大黃雖取其瀉下與乾薑亦何所預乎況又三味等分則於其分兩亦有不然者且丁子之取輕粉之毒人未知其妙用唯以紫丸或備急丸取其瀉下亦後方所誤多參口舌糜爛飲食不下咽者皆是粉毒所致也此後方者唯取下輕粉之毒而已豈有他乎續七寶丸今多用之水銀二錢半硝石礬石各六錢鹽二錢上四味先碎硝石礬石乃合四味內瓦盆中以茗碗覆之以泥封之安架火而自下燒之半日許既而取其所屬眷茗碗之霜以棗肉為丸服之如前七寶丸之法至第七日服後方丸亦如前承氣丸治腹滿或燥屎不通者大黃八錢硝石十二錢上二味為末糊丸如梧桐子大以枳實厚朴湯服之每服八分枳實厚朴湯枳實一錢二分厚朴一錢八分上二味以水一合五勺煮取六勺送下承氣丸八分礬石大黃丸治無名毒腫及癜風疥癬礬石大黃各等分上二味杵篩為末每一錢以溫湯服之日一滑石礬石甘草散治淋痛小便不利者滑石礬石各六兩甘草三兩上三味杵篩為末每服一錢溫湯下之鐵砂散治黃胖病鐵砂蕎麥粉各十二錢大黃六兩上三味杵篩二味為末和蕎麥粉以水煉之丸如緑豆大每服一錢以清酒下之日三桃花湯治浮腫大小便不通者桃花二錢大黃一錢上二味以水二合先內桃花煮取一合二勺內大黃煮取六勺頓服小瘡摺方治諸疥癬及膁瘡巴豆去殼萆麻子各一錢大黃五分上三味先研二味為泥內大黃末綿包浸暖酒中攝之一日五度至七日而止八日詰朝浴溫湯一日七回愈若不愈如前法薏苡仁丸治小兒頭瘡及胎毒諸瘡大人亦得治薏苡仁十錢大黃五錢土茯苓二十錢上三味杵散為末蜜丸彈子大每一丸日三以上十三方先師東洞翁家孰方也余嘗受之而試之十數年無一方不效者然海內傳方之人唯受其方而分兩服度無所考定有錯誤者今詳校索之以傳永世入門之士宜祕之耳安永九年庚子仲夏肥後村井杶謹識方極桂枝湯治上衝頭痛發熱汗出惡風者桂枝加桂湯治本方證而上衝劇者桂枝加芍藥湯治桂枝湯證而復拘攣甚者桂枝去芍藥湯治桂枝湯證而不拘攣者桂枝加葛根湯治本方證而項背強急者栝蔞桂枝湯治桂枝湯證而渴者桂枝加黃蓍湯治本方證而黃汗若自汗盜汗者桂枝加芍藥大黃湯治桂枝加芍藥湯證而有停滯者桂枝加厚朴杏仁湯治桂枝湯證而胸滿微喘者烏頭桂枝湯治腹中絞痛手足逆冷或不仁或身疼痛者桂枝加附子湯治本方證而惡寒或支節微痛者桂枝去芍藥加附子湯治桂枝去芍藥湯證而惡寒者桂枝附子湯治桂枝去芍藥湯證而身體疼煩不能自轉側者桂枝附子去桂加朮湯治前方證而大便硬小便自利不上衝者桂枝去桂加芩術湯治桂枝湯證而悸小便不利不上衝者桂薑棗草黃辛附湯治桂枝去芍藥湯麻黃附子細辛湯二方證相合者桂枝去芍藥加皂莢湯治桂枝去芍藥湯證而吐濁垂涎沫者桂枝加龍骨牡蠣湯治桂枝湯證而胸腹有動者桂枝去芍藥加蜀漆龍骨牡蠣湯治桂枝去芍藥湯證而胸腹動劇者桂枝加芍藥生薑人參湯治桂枝湯證而心下痞鞕或拘攣及嘔者桂枝二麻黃一湯治桂枝湯證多麻黃湯證少者桂枝二越婢一湯治桂枝湯證多越婢湯證少者桂枝麻黃各半湯治桂枝湯麻黃湯二方證相半者小建中湯治裡急腹皮拘急及急痛者黃蓍建中湯治小建中湯證而盜汗或自汗者黃蓍桂枝五物湯治桂枝湯證而嘔身體麻痹不急迫者黃蓍桂枝苦酒湯治身體腫發熱汗出汗沾衣色正黃如藥汁者桂枝甘草湯治上衝急迫者半夏散及湯治咽喉痛上衝急迫者桂枝甘草附子湯治桂枝甘草湯證而骨節煩疼小便不利者桂枝甘草龍骨牡蠣湯治胸腹有動急迫者桂枝人參湯治人參湯證而上衝急迫劇者人參湯治心下痞鞕小便不利或急痛或胸中痹者茯苓甘草湯治心下悸上衝而嘔者茯苓杏仁甘草湯治悸而胸中痹者茯苓戎鹽湯治心下悸小便不利者葵子茯苓散治小便不利心下悸腫滿者苓薑朮甘湯治心下悸小便自利腰中冷如坐水中若疼重形如水狀者苓桂朮甘湯治心下悸上衝起則頭眩小水不利者苓桂甘棗湯治臍下悸而攣急上衝者苓桂五味甘草湯治心下悸上衝咳而急迫者苓甘五味姜辛湯治前方證而不上衝痰飲滿者苓甘姜味辛夏湯治前方證而謳者苓甘姜味辛夏仁湯治前方證而微浮腫者苓甘姜味辛夏仁黃湯治前方證而腹中微結者茯苓澤瀉湯治心下悸小便不利上衝及嘔吐渴欲飲水者澤瀉湯治苦冒眩小便不利者五苓散治消渴小便不利若渴欲飲水水入則吐者茵陳五苓散治發黃兼前方證者豬苓湯治小便不利若淋瀝若渴欲飲水者豬苓湯治渴而心下悸小便不利者牡蠣澤瀉散治身體水腫腹中有動渴而小便不利者八味丸治臍下不仁小便不利者栝蔞瞿麥丸治心下悸小便不利惡寒而渴者麻黃湯治喘而無汗頭痛發熱惡寒身體疹者麻黃加朮湯治本方證而小便不利者麻黃甘草湯治喘急迫或自汗或不汗者麻黃附子甘草湯治前方證而惡寒或身微痛者麻黃附子細辛湯治麻黃附子甘草湯證而不急迫有痰飲之變者麻黃杏仁甘草石膏湯治麻黃甘草湯證而咳煩渴者麻黃杏仁薏苡甘草湯治前方證而不煩渴有水氣者牡蠣湯治麻黃甘草湯證而胸中有動者麻黃醇酒湯治喘而發黃或身疼者半夏麻黃丸治喘而嘔者小青龍湯治咳喘上衝頭痛發熱惡風或乾嘔者大青龍湯治喘及咳嗽渴欲飲水上衝或身疼惡風寒者文蛤湯治煩渴而喘咳急者越婢湯治大青龍湯證而不咳嗽上衝者越婢加朮湯治本方證而小便不利者越婢加半夏湯治本方證而嘔逆者葛根湯治項背強急發熱惡風或喘或身疼者葛根加半夏湯治本方證而嘔者葛根黃芩黃連湯治項背強急心悸而下利者小柴胡湯治胸脅苦滿或寒熱往來或嘔者柴胡加芒硝湯治小柴胡湯證而苦滿難解者柴胡去半夏加栝蔞湯治小柴胡湯證而渴不嘔者柴胡桂枝湯治小柴胡湯與桂枝湯二方證相合者柴胡桂枝幹薑湯治小柴胡湯證而不嘔不痞上衝而渴腹中有動者大柴胡湯治小柴胡湯證而心下不痞鞕腹滿拘攣或嘔者白虎湯治大渴引飲煩躁者白虎加人參湯治本方證而心下痞鞕者白虎加桂枝湯治白虎湯證而上衝者小承氣湯治腹滿而大便鞕者厚朴七物湯治腹滿發熱上逆嘔者大承氣湯治腹堅滿若下利臭穢若燥屎者凡有燥屎者臍下必磊砢也肌膚苦燥大黃黃連瀉心湯治心煩心下痞按之濡者瀉心湯治心氣不定心下痞按之濡者附子瀉心湯治瀉心湯證而惡寒者大黃附子湯治腹絞痛惡寒者大黃甘遂湯治小腹滿如敦狀小便微難或經水不調者抵當湯治瘀血者凡有瘀血者二焉少腹鞕滿小便快利者一也腹不滿其人言我滿者二也急則以湯緩則以丸抵當丸橘皮大黃朴消湯治心胸間有宿滯而結者大黃硝石湯治發黃腹中有結塊者大黃牡丹湯治臍下有堅塊按之即痛及便膿血者大黃甘草湯治便祕急迫者調胃承氣湯治大黃甘草湯證而實者桃核承氣湯治血證小腹急結上衝者下瘀血湯治臍下毒痛及經水不利者土瓜根散治少腹拘急經水不利或下白物者甘草湯治病逼迫及咽急痛者桔梗湯治甘草湯證而有膿或黏痰者排膿湯治膿血及黏痰急迫者芍藥甘草湯治拘攣急迫者甘遂半夏湯治芍藥甘草湯證而心下鞕滿者芍藥甘草附子湯治芍藥甘草湯證而惡寒者甘麥大棗湯治急迫而狂驚者甘草粉蜜湯治吐涎吐蟲心痛發作有時者生薑甘草湯治咳唾涎沫不止心下痞鞕急迫者乾薑甘草湯治厥而煩躁多涎唾者四逆湯治四肢逆厥身體疼痛下利清穀或小便清利者四逆加人參湯治四逆湯證而心下痞鞕者茯苓四逆湯治前方證而悸者附子粳米湯治腹中雷鳴切痛或嘔吐者薏苡附子散治胸中痹惡寒者薏苡附子敗漿散治身甲錯腹皮急按之濡如腫狀腹無積聚者大烏頭煎治毒繞臍絞痛或自汗出手足厥冷者烏頭湯治骨節疼痛不可屈伸若自汗或盜汗若腹絞痛者赤丸治心下悸有痰飲惡寒或微厥者真武湯治心中燥身瞤動振振欲擲地小便不利或嘔若下利若拘痛者附子湯治身體攣痛小便不利心下痞鞕若腹痛者天雄散治小便不利上逆臍下有動惡寒者梔子豉湯治心中懊憹者梔子甘草豉湯治本方證而急迫者梔子生薑豉湯治梔子豉湯證而嘔者枳實梔子豉湯治梔子豉湯證而胸滿者梔子大黃湯治前方證而閉者茵陳蒿湯治一身發黃大便難者梔子蘗皮湯治身黃發熱心煩者梔子厚朴湯治胸腹煩滿者梔子乾薑湯治心中微煩者大陷胸湯治結胸若從心下至少腹鞕滿者大陷胸丸治結胸若項背強者小陷胸湯治小結胸者栝蔞薤白白酒湯治胸背痛喘息咳唾者栝蔞薤白半夏湯治前方證而嘔者瓜蒂散治溫溫欲吐者文蛤散治渴者大半夏湯治嘔吐而心下痞鞕者小半夏湯治吐而不渴者生薑半夏湯治似喘不喘似嘔不嘔似噦不噦心中憒憒然無奈何者小半夏加茯苓湯治小半夏湯證而眩悸者半夏苦酒湯治咽中生瘡音啞者半夏厚朴湯治咽中如有炙臠或嘔心下悸者半夏乾薑散治乾嘔吐逆涎沫者乾薑人參半夏丸治嘔吐不止心下痞鞕者半夏瀉心湯治心下痞鞕腹中雷鳴者甘草瀉心湯治前方證而心煩不得安者生薑瀉心湯治半夏瀉心湯證而嘔者吳茱萸湯治胸滿心下痞鞕嘔者厚朴生薑半夏甘草人參湯治胸腹滿而嘔者黃連湯治心煩心下痞欲嘔吐上衝者乾薑黃連黃芩人參湯治心煩心下痞鞕吐下者六建中湯治腹大痛嘔不能食腹皮起如有頭足者黃連阿膠湯治心中悸而煩不得眠者黃芩湯治下利腹拘急者黃芩加半夏生薑湯治本方證而嘔逆者大物黃芩湯治心下痞鞕乾嘔下利上衝者三物黃芩湯治心胸苦煩者白頭翁湯治熱利下重而心悸者白頭翁加甘草阿膠湯治前方證而有血證急迫者木防己湯治心下痞鞕煩渴者木防己去石膏加茯苓芒硝湯治心下痞堅而悸者防己茯苓湯治四肢聶聶動水氣在皮膚而上衝者防己黃蓍湯治水病身重汗出惡風小便不利者枳實芍藥散治腹滿拘攣或痛者枳朮湯治心下堅滿小便不利者排膿散治瘡家胸腹拘滿若吐黏痰或便膿血者桂枝生薑枳實湯治胸滿上逆或嘔者枳實薤白桂枝湯治胸中痹滿痛者橘皮枳實生薑湯治胸中痹滿而嘔者茯苓飲治心下痞鞕而悸小便不利胸滿而自吐宿水者橘皮竹茹湯治胸中痹吃逆者橘皮湯治胸中痹嘔噦者桂枝茯苓丸治拘攣上衝心下悸經水有變或胎動者芎歸膠艾湯治漏下腹中痛者旋覆花代赭石湯治心下痞鞕噯氣不除者赤石脂禹餘糧糧湯治毒在臍下而利者桃花湯治便膿血者蜜煎導治肛中乾燥大便澀者酸棗仁湯治煩躁不得眠者葶藶大棗瀉肺湯治浮腫咳逆喘鳴迫塞胸滿強急者麻仁丸治平日大便祕者己椒藶黃丸治腹滿口舌乾燥二便澀滯者蜀漆散治寒熱發作有時臍下有動者十棗湯治病在胸腹掣痛者桔梗白散治毒在胸咽或吐下如膿汁者走馬湯洽胸腹有毒若心痛若腹痛者備急丸治心腹卒痛者礬石湯治腳氣痿弱不仁及上入搶心者硝礬散治一身悉黃腹脹如水狀大便黑時溏者礬石丸治經水不利下白物者蛇床子散治下白物陰中癢或有小瘡者方極跋墨子悲絲楊子泣歧蓋為失其末也絲之青黑歧之東西所以悲且泣者耶叔和王氏撰次傷寒之論其所以攙入也雖云羽異於長沙亦猶東西其道而青黑之嗚呼叔和乎欲傳長沙之道者而或後之人時乎命乎將非其人乎滔滔乎後之人也我東洞先生崛起東方於數千載之下跋涉之勤矣始得取道於長沙吾從而遊者久矣乃語余曰長沙之道也莫大乎醫焉三代而下秦及漢雖有聞人斯道不可知矣獨有長沙其骨雖朽其道存焉雖道之則存乃東西而青黑之所使楊墨悲且泣也不為不少矣吾將擇其正路之與素絲汝記之余曰敬諾於是數十旬而成也名曰方極取義於中極已寶曆五年乙亥冬十月長門品丘明謹撰
